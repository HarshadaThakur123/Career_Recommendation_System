<!DOCTYPE html>
<html>
<head>
    <title>Login - Dishamitra</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="box" style="max-width: 400px; margin-top: 100px;">
    <h2>👋 Welcome Back</h2>
    {% if error %}
        <div style="color: #ef4444; padding: 10px; background: #fee2e2; border-radius: 8px; margin-bottom: 20px;">
            {{ error }}
        </div>
    {% endif %}
    <form method="POST">
        <input type="email" name="email" placeholder="Email" required style="margin-bottom: 15px;">
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" style="margin-top: 15px;">Login</button>
    </form>
    <p style="text-align: center; margin-top: 20px;">
        Don't have account? <a href="/register">Register</a>
    </p>
    <p style="text-align: center; font-size: 12px; color: #666;">
        Demo: student@test.com / 123456
    </p>
</div>
</body>
</html>
